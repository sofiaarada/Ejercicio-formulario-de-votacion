<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <div class="div-logo">
            <img src="https://www.chinchina-caldas.gov.co/sites/chinchinacaldas/content/files/001130/56489_registraduria-nacional-del-estado-civil_1024x600.png" alt="logo de la Registraduria">
        </div>
        <div >
            <h1 class="registraduría-na">Registraduria Nacional</h1>
        </div>
    </header>
    <main>
        <div>
            <h2 class="FormVotacion">Formulario de Votación</h2>
        </div>
        <aside>
            <div class="form">
                <form action="get">
                    <div class="form-content">
                        <div class="lab-inp">
                            <label>Nombre (s):</label>
                            <input type="text" id="nombre" name="nombre">
                        </div>
                        <div class="lab-inp">
                            <label>Apellidos (s):</label>
                            <input type="text" id="apellido" name="apellido">
                        </div>
                        <div class="lab-inp">
                            <label>Número de Telefonó:</label>
                            <input type="number" id="celular" name="celular">
                        </div>
                        <div class="lab-inp">
                            <label>Correo Electronico:</label>
                            <input type="email" name="correo" id="email">
                        </div>
                        <div class="lab-inp">
                            <label>Fecha de Nacimiento:</label>
                            <input type="date" name="date-nacimiento" id="date-nacimiento">
                        </div>
                        <div class="select-dep">
                            <label>Departamento de Residencia:</label>
                                <select name="departamento" id="departamento">
                                    <option class="dep">Amazonas</option>
                                    <option class="dep">Antioquia</option>
                                    <option class="dep">Arauca</option>
                                    <option class="dep">Atlántico</option>
                                    <option class="dep">Bolívar</option>
                                    <option class="dep">Boyacá</option>
                                    <option class="dep">Caldas</option>
                                    <option class="dep">Caquetá</option>
                                    <option class="dep">Casanare</option>
                                    <option class="dep">Cauca</option>
                                    <option class="dep">Cesar</option>
                                    <option class="dep">Chocó</option>
                                    <option class="dep">Córdoba</option>
                                    <option class="dep">Cundinamarca</option>
                                    <option class="dep">Guainía</option>
                                    <option class="dep">Guaviare</option>
                                    <option class="dep">Huila</option>
                                    <option class="dep">La Guajira</option>
                                    <option class="dep">Magdalena</option>
                                    <option class="dep">Meta</option>
                                    <option class="dep">Nariño</option>
                                    <option class="dep">Norta de Santander</option>
                                    <option class="dep">Putumayo</option>
                                    <option class="dep">Quindío</option>
                                    <option class="dep">Risaralda</option>
                                    <option class="dep">San Andrés, Providencia y Santa Catalina</option>
                                    <option class="dep">Santander</option>
                                    <option class="dep">Sucre</option>
                                    <option class="dep">Tolima</option>
                                    <option class="dep">Valle del cauca</option>
                                    <option class="dep">Vaupés</option>
                                    <option class="dep">Vichada</option>
                                </select>
                        </div>
                        <div class="select-city">
                            <select name="ciudad" id="ciudad">
                                <option value=""></option>
                            </select>
                        </div>
                    </div>
                    

                </form>
            </div>
        </aside>
    </main>
</body>
</html>
